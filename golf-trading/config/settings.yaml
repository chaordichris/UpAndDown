# UpAndDown — System Configuration
# All non-secret parameters live here.
# Secrets (API keys, DB passwords) go in .env.

pipeline:
  # How often to poll DataGolf during a tournament week (hours)
  datagolf_poll_interval_hours: 6
  # How often to poll sportsbook odds during a tournament week (hours)
  odds_poll_interval_hours: 2
  # Maximum age of odds before they are considered stale (hours)
  odds_staleness_threshold_hours: 3

bankroll:
  # Fraction of total capital kept in reserve — never deployed
  reserve_fraction: 0.50
  # Fraction of total capital in the active core sleeve
  active_core_fraction: 0.40
  # Fraction of total capital in the convex (outright) sleeve
  convex_fraction: 0.10

sizing:
  # Kelly multiplier for core bets (0.25 = quarter Kelly)
  kelly_fraction: 0.25
  # Posterior Kelly is wired through candidates/ticketing, but disabled for live sizing
  # until parallel paper-trading proves the Batch C path.
  posterior_kelly_enabled: false
  # Fixed unit for convex bets as fraction of convex sleeve
  convex_unit_fraction: 0.005
  # Minimum bet size in dollars
  min_bet_dollars: 5.0
  # Hard ceiling: max single bet as fraction of total capital
  max_bet_fraction: 0.02

exposure:
  # Max total exposure to a single golfer as fraction of active core
  max_golfer_fraction: 0.03
  # Max total exposure to a single tournament as fraction of total capital
  max_tournament_fraction: 0.05
  # Max total at any single book as fraction of active capital
  max_book_fraction: 0.60

edge:
  # Minimum edge (as decimal, e.g. 0.03 = 3%) to consider a core bet
  min_edge_core: 0.03
  # Minimum edge to consider a convex (outright) bet
  min_edge_convex: 0.08
  # FDR control is wired through candidate generation, but disabled for live selection
  # until parallel paper-trading proves the Batch C path.
  fdr_enabled: false
  # Benjamini-Hochberg q values by sleeve when FDR is enabled.
  fdr_q_core: 0.20
  fdr_q_convex: 0.10

drawdown:
  # Drawdown levels as fraction of peak active-core bankroll
  alert_threshold: 0.10
  reduce_threshold: 0.15   # halve unit sizes
  severe_threshold: 0.20   # quarter unit sizes
  paper_only_threshold: 0.25  # no real bets
  halt_threshold: 0.35     # full system halt

ror:
  # Default Monte Carlo shape for phase-gate risk-of-ruin reviews.
  bet_count: 100
  simulations: 10000
  seed: 20260430

vig_removal:
  # Method for two-way markets: "multiplicative" or "power"
  two_way_method: multiplicative
  # Method for multi-way markets (outrights, top-N)
  multi_way_method: power

shadow_live:
  # Shadow-live / minimum-stake mode — Phase 4 operational learning.
  # Paper trading remains the Phase 3 gate evidence path.
  # Set enabled: true only when deliberately placing real-money shadow bets.
  # All placement is still manual; no automation is added.
  enabled: false
  # Total real bankroll allocated to shadow-live learning.
  starting_bankroll_dollars: 500.0
  # Hard cap per individual shadow-live bet (enforced before write).
  per_bet_cap_dollars: 25.0
  # Hard cap on cumulative shadow-live stakes in one tournament week.
  per_tournament_cap_dollars: 100.0

marketmaking:
  # Prediction-market market-making pod (WS-9). Simulator-only scaffold.
  # See docs/prediction-market-mm-spec.md. Stays disabled until the MM-2
  # phase gate passes. Loaded by src/marketmaking/config.py.
  enabled: false
  # Posterior trust in DataGolf per market type (effective sample size).
  ess_by_market_type:
    make_cut: 400
    top_20: 300
    top_10: 250
    top_5: 200
    outright_win: 150
  # Width of the credible interval behind quoted spreads (0.5/0.8/0.9/0.95).
  credible_interval: 0.80
  # Never quote tighter than this half-spread (dollars per contract).
  min_half_spread: 0.02
  # Half-spread must cover at least this multiple of posterior half-width.
  uncertainty_spread_mult: 1.0
  # No-quote default: stand down when posterior half-width exceeds this.
  max_quotable_half_width: 0.06
  # Mid shift per unit of inventory utilization, in posterior half-widths.
  inventory_skew_intensity: 1.0
  # Contracts per side at zero inventory.
  base_quote_size: 10
  # Hard vetoes (risk engine; cannot be overridden by quoting).
  max_position_per_market: 50
  max_notional_per_tournament: 200.0
  daily_loss_kill_switch: 100.0
  # Venue fee per contract; set from the venue schedule at MM-1.
  fee_per_contract: 0.0
